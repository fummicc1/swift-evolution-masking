name: "Update Masking Quiz"

on:
  workflow_dispatch:
  workflow_call:
    secrets:
      PAYLOAD_API_URL:
        required: true
      PAYLOAD_API_KEY:
        required: true

defaults:
  run:
    shell: bash

env:
  PAYLOAD_API_URL: ${{ secrets.PAYLOAD_API_URL }}
  PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}

concurrency:
  group: "update-masking-quiz-${{ github.ref }}"
  cancel-in-progress: false

jobs:
  mask-and-upload:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests \
            python-frontmatter \
            markdown \
            pygments \
            spacy \
            click \
            matplotlib \
            numpy \
            pandas \
            beautifulsoup4 \
            python-dotenv \
            scikit-learn \
            tqdm
          python -m spacy download en_core_web_md

      - name: Create artifacts directory
        run: mkdir -p artifacts

      - name: Process and upload proposals
        run: |
          python .github/scripts/mask_and_upload.py
        env:
          PYTHONUNBUFFERED: 1

      - name: Store artifacts
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: word_freq_hist
          path: artifacts/
