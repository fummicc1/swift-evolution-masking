name: "[Cron] Merge Upstream"

on:
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          # .gitattributesの `.github/workflows/** merge=ours` を機能させるための
          # カスタムマージドライバ定義（.gitattributesだけではドライバの実体は配布されない）
          git config --global merge.ours.driver true

      - name: Add Upstream Remote
        run: |
          git remote add upstream https://github.com/swiftlang/swift-evolution.git
          git remote -v

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream
        run: |
          git checkout main
          before=$(git rev-parse HEAD)

          if ! git merge upstream/main --no-edit; then
            if [ ! -f .git/MERGE_HEAD ]; then
              echo "::error::git merge failed for a reason other than a content conflict"
              exit 1
            fi

            # The default GITHUB_TOKEN cannot push changes to files under
            # .github/workflows (it lacks the `workflows` permission). Conflicts
            # there - including modify/delete conflicts, which the `merge=ours`
            # gitattribute cannot resolve - are settled by keeping our pre-merge
            # tree for that path. Anything conflicting outside .github/workflows
            # is a real problem we must not silently paper over.
            mapfile -t conflicted < <(git diff --name-only --diff-filter=U)
            other_conflicts=()
            for f in "${conflicted[@]}"; do
              case "$f" in
                .github/workflows/*) ;;
                *) other_conflicts+=("$f") ;;
              esac
            done

            if [ "${#other_conflicts[@]}" -gt 0 ]; then
              echo "::error::Unresolved merge conflicts outside .github/workflows:"
              printf '%s\n' "${other_conflicts[@]}"
              exit 1
            fi

            for f in "${conflicted[@]}"; do
              if git cat-file -e "$before:$f" 2>/dev/null; then
                git show "$before:$f" > "$f"
                git add -- "$f"
              else
                git rm -f -- "$f"
              fi
            done

            git commit --no-edit
          fi

          after=$(git rev-parse HEAD)
          if [ "$before" != "$after" ]; then
            # Even a clean (non-conflicting) merge can still bring in upstream
            # changes under .github/workflows (e.g. newly added upstream workflow
            # files, or edits git could auto-merge). Restore our own workflow
            # definitions before pushing.
            if ! git diff --quiet "$before" "$after" -- .github/workflows; then
              # Reset .github/workflows entirely to its pre-merge state. A plain
              # `git checkout "$before" -- .github/workflows` only restores paths
              # that exist in $before, so newly added upstream workflow files
              # would survive and still be pushed. Removing the tree first
              # guarantees additions are dropped.
              git rm -r --quiet .github/workflows
              git checkout "$before" -- .github/workflows
              git commit --amend --no-edit
            fi
          fi
          git push origin main

  update-masking-quiz:
    uses: ./.github/workflows/update-masking-quiz.yaml
    needs: merge-upstream
    secrets:
      PAYLOAD_API_URL: ${{ secrets.PAYLOAD_API_URL }}
      PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}
