name: "[Cron] Merge Upstream"

on:
  schedule:
    - cron: "0 0 * * *"
  # Allow manual trigger
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  merge-upstream:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Add Upstream Remote
        run: |
          git remote add upstream https://github.com/swiftlang/swift-evolution.git
          git remote -v

      - name: Fetch Upstream
        run: git fetch upstream

      - name: Merge Upstream
        run: |
          git checkout main
          before=$(git rev-parse HEAD)
          git merge upstream/main --no-edit
          after=$(git rev-parse HEAD)
          if [ "$before" != "$after" ]; then
            # The default GITHUB_TOKEN cannot push changes to files under
            # .github/workflows (it lacks the `workflows` permission), so a
            # merge that imports or modifies upstream workflow files would be
            # rejected. We only care about upstream proposal content here, so
            # restore our own workflow definitions before pushing.
            if ! git diff --quiet "$before" "$after" -- .github/workflows; then
              # Reset .github/workflows entirely to its pre-merge state. A plain
              # `git checkout "$before" -- .github/workflows` only restores paths
              # that exist in $before, so newly added upstream workflow files
              # (e.g. proposal_pull_request_swift.yml) would survive and still be
              # pushed. Removing the tree first guarantees additions are dropped.
              git rm -r --quiet .github/workflows
              git checkout "$before" -- .github/workflows
              git commit --amend --no-edit
            fi
          fi
          git push origin main

  update-masking-quiz:
    uses: ./.github/workflows/update-masking-quiz.yaml
    needs: merge-upstream
    secrets:
      PAYLOAD_API_URL: ${{ secrets.PAYLOAD_API_URL }}
      PAYLOAD_API_KEY: ${{ secrets.PAYLOAD_API_KEY }}
